services:
  redis:
    image: redis:7-alpine
    container_name: yummydoors_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    # Instead of building from source, the VPS pulls the pre-built image
    image: ${DOCKER_USERNAME}/yummydoors-backend:latest
    container_name: yummydoors_app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: 8080
      YUMMYDOORS_POSTGRES_HOST: ${YUMMYDOORS_POSTGRES_HOST:-postgres}
      YUMMYDOORS_POSTGRES_PORT: ${YUMMYDOORS_POSTGRES_PORT:-5432}
      YUMMYDOORS_POSTGRES_DB: ${YUMMYDOORS_POSTGRES_DB:-yummydoors}
      YUMMYDOORS_POSTGRES_USER: ${YUMMYDOORS_POSTGRES_USER:-postgres}
      YUMMYDOORS_REDIS_URL: ${YUMMYDOORS_REDIS_URL:-redis://redis:6379/0}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      GUNICORN_GRACEFUL_TIMEOUT: ${GUNICORN_GRACEFUL_TIMEOUT:-30}
      GUNICORN_KEEPALIVE: ${GUNICORN_KEEPALIVE:-5}
    ports:
      - "127.0.0.1:${YUMMYDOORS_APP_PORT:-8010}:8080"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  worker:
    image: ${DOCKER_USERNAME}/yummydoors-backend:latest
    container_name: yummydoors_worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      YUMMYDOORS_POSTGRES_HOST: ${YUMMYDOORS_POSTGRES_HOST:-postgres}
      YUMMYDOORS_POSTGRES_PORT: ${YUMMYDOORS_POSTGRES_PORT:-5432}
      YUMMYDOORS_POSTGRES_DB: ${YUMMYDOORS_POSTGRES_DB:-yummydoors}
      YUMMYDOORS_POSTGRES_USER: ${YUMMYDOORS_POSTGRES_USER:-postgres}
      YUMMYDOORS_REDIS_URL: ${YUMMYDOORS_REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A app.celery_app:celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-1}

  postgres:
    image: postgres:16-alpine
    container_name: yummydoors_postgres
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${YUMMYDOORS_POSTGRES_DB:-yummydoors}
      POSTGRES_USER: ${YUMMYDOORS_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${YUMMYDOORS_POSTGRES_PASSWORD:-postgres}
    volumes:
      - yummydoors_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Watchtower checks Docker Hub every 60 seconds and updates 'yummydoors_app' silently
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 yummydoors_app yummydoors_worker

volumes:
  yummydoors_postgres_data:
    name: yummydoors_postgres_data
