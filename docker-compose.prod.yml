services:
  app:
    build:
      context: .
    image: yummydoors-backend:latest
    container_name: yummydoors_app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: 8080
      YUMMYDOORS_POSTGRES_HOST: ${YUMMYDOORS_POSTGRES_HOST:-postgres}
      YUMMYDOORS_POSTGRES_PORT: ${YUMMYDOORS_POSTGRES_PORT:-5432}
      YUMMYDOORS_POSTGRES_DB: ${YUMMYDOORS_POSTGRES_DB:-yummydoors}
      YUMMYDOORS_POSTGRES_USER: ${YUMMYDOORS_POSTGRES_USER:-postgres}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      GUNICORN_GRACEFUL_TIMEOUT: ${GUNICORN_GRACEFUL_TIMEOUT:-30}
      GUNICORN_KEEPALIVE: ${GUNICORN_KEEPALIVE:-5}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${YUMMYDOORS_APP_PORT:-8010}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: yummydoors_postgres
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${YUMMYDOORS_POSTGRES_DB:-yummydoors}
      POSTGRES_USER: ${YUMMYDOORS_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${YUMMYDOORS_POSTGRES_PASSWORD:-postgres}
    volumes:
      - yummydoors_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  yummydoors_postgres_data:
    name: yummydoors_postgres_data
