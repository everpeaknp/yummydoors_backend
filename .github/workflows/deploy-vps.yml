name: Deploy To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: yummydoors-backend-vps-deploy
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Compile application
        run: python -m compileall app

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo "No tests directory yet. Skipping pytest."
          fi

      - name: Build production image
        run: docker build -t yummydoors-backend:deploycheck .

  deploy:
    runs-on: ubuntu-latest
    needs: quality
    environment: production

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload production env file
        run: |
          tmp_env="$(mktemp)"
          printf '%s\n' "${{ secrets.ENV_PRODUCTION }}" > "$tmp_env"
          scp -P "${{ secrets.VPS_PORT }}" -o IdentitiesOnly=yes "$tmp_env" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PROJECT_PATH }}/.env.production"
          rm -f "$tmp_env"

      - name: Deploy on server
        run: |
          ssh -p "${{ secrets.VPS_PORT }}" -o IdentitiesOnly=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
          set -euo pipefail
          cd "${{ secrets.VPS_PROJECT_PATH }}"
          git fetch origin
          git checkout main
          git pull --ff-only origin main
          bash scripts/deploy.sh
          EOF
