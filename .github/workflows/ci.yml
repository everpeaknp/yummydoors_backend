name: Backend CI

env:
  IMAGE_NAME: ramoniswack/yummydoors-backend
  VPS_HOSTNAME: 203.134.250.212
  VPS_PORT_NUMBER: "2025"
  VPS_USERNAME: evaracy
  VPS_APP_PATH: /home/evaracy/yummydoors_backend

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: yummydoors-backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Compile application
        run: python -m compileall app

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo "No tests directory yet. Skipping pytest."
          fi

      - name: Build production image
        run: docker build -t yummydoors-backend:ci .

  build-and-push:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Write deploy key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/yummydoors_deploy_key
          chmod 600 ~/.ssh/yummydoors_deploy_key

      - name: Show loaded deploy key fingerprint
        run: |
          echo "Derived public key:"
          ssh-keygen -y -f ~/.ssh/yummydoors_deploy_key
          echo "Fingerprint:"
          ssh-keygen -lf ~/.ssh/yummydoors_deploy_key

      - name: Add VPS host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ env.VPS_PORT_NUMBER }}" "${{ env.VPS_HOSTNAME }}" >> ~/.ssh/known_hosts

      - name: SSH preflight
        run: |
          ssh -v -i ~/.ssh/yummydoors_deploy_key \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -p "${{ env.VPS_PORT_NUMBER }}" \
            "${{ env.VPS_USERNAME }}@${{ env.VPS_HOSTNAME }}" "echo ssh-ok"

      - name: Deploy exact image on server
        run: |
          ssh -i ~/.ssh/yummydoors_deploy_key \
          -o IdentitiesOnly=yes \
          -o BatchMode=yes \
          -o StrictHostKeyChecking=yes \
          -o ServerAliveInterval=15 \
          -o ServerAliveCountMax=20 \
          -p "${{ env.VPS_PORT_NUMBER }}" "${{ env.VPS_USERNAME }}@${{ env.VPS_HOSTNAME }}" <<'EOF'
          set -euo pipefail
          cd "${{ env.VPS_APP_PATH }}"
          docker pull "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker tag "${{ env.IMAGE_NAME }}:${{ github.sha }}" "${{ env.IMAGE_NAME }}:latest"
          available_services="$(docker compose config --services)"
          set -- app
          for service in worker redis watchtower; do
            if printf '%s\n' "$available_services" | grep -qx "$service"; then
              set -- "$@" "$service"
            fi
          done
          docker compose up -d --force-recreate --remove-orphans "$@"
          docker compose ps
          end=$((SECONDS + 300))
          while [ "$SECONDS" -lt "$end" ]; do
            status="$(docker inspect -f '{{.State.Health.Status}}' yummydoors_app 2>/dev/null || true)"
            if [ "$status" = "healthy" ]; then
              if curl -fsS http://127.0.0.1:8010/health >/dev/null; then
                exit 0
              fi
            fi
            sleep 5
          done
          echo "Timed out waiting for yummydoors_app to become healthy"
          docker compose logs --tail=120 app worker redis postgres watchtower 2>/dev/null || docker compose logs --tail=120 app postgres
          exit 1
          EOF
