name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: yummydoors-backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Compile application
        run: python -m compileall app

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo "No tests directory yet. Skipping pytest."
          fi

      - name: Build production image
        run: docker build -t yummydoors-backend:ci .

  build-and-push:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/yummydoors-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/yummydoors-backend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Write deploy key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/yummydoors_deploy_key
          chmod 600 ~/.ssh/yummydoors_deploy_key

      - name: Show loaded deploy key fingerprint
        run: |
          echo "Derived public key:"
          ssh-keygen -y -f ~/.ssh/yummydoors_deploy_key
          echo "Fingerprint:"
          ssh-keygen -lf ~/.ssh/yummydoors_deploy_key

      - name: Add VPS host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: SSH preflight
        run: |
          ssh -v -i ~/.ssh/yummydoors_deploy_key \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "echo ssh-ok"

      - name: Deploy latest image on server
        run: |
          ssh -i ~/.ssh/yummydoors_deploy_key \
          -o IdentitiesOnly=yes \
          -o BatchMode=yes \
          -o StrictHostKeyChecking=yes \
          -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'EOF'
          set -euo pipefail
          cd "${{ secrets.VPS_PROJECT_PATH }}"
          docker compose pull
          docker compose up -d --force-recreate app
          docker compose ps
          EOF
