services:
  redis:
    image: redis:7-alpine
    container_name: yummydoors_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - yummydoors_redis_data:/data

  postgres:
    image: postgres:17
    container_name: yummydoors-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: yummydoors
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - yummydoors_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yummydoors"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  yummydoors_postgres_data:
  yummydoors_redis_data:
